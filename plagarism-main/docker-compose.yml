services:
  app:
    build: .
    ports:
      - "5077:5077"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://admin:admin123@db:5432/mydatabase?schema=public
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
